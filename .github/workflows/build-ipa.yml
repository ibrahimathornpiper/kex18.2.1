name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Dependencies
        run: |
          brew install ldid zstd gnu-sed

      - name: Download Bootstrap Files
        working-directory: Application/Dopamine/Resources
        run: |
          chmod +x download_bootstraps.sh
          ./download_bootstraps.sh || echo "Bootstrap download skipped"

      - name: Build ChOma
        working-directory: BaseBin/ChOma
        run: |
          brew install openssl
          make TARGET=ios DISABLE_TESTS=1

      - name: Build libjailbreak
        working-directory: BaseBin
        run: |
          mkdir -p .build
          mkdir -p .include/choma
          brew install libarchive
          cp ChOma/output/ios/lib/libchoma.a .build/
          cp ChOma/output/ios/include/choma/*.h .include/choma/
          cd libjailbreak && make
          cp libjailbreak.dylib ../.build/

      - name: Build Xcode Project
        working-directory: Application
        run: |
          xcodebuild -project Dopamine.xcodeproj \
            -scheme Dopamine \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r Application/build/Build/Products/Release-iphoneos/Dopamine.app Payload/
          zip -r Dopomine-DS.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dopomine-DS-IPA
          path: Dopomine-DS.ipa
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Dopomine-DS.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
